location /images/ {
  expires 5s;
  root   /usr/share/nginx/html;
  try_files $uri /images/placeholder.jpg;
}

location /api/catalogue/ { 
  proxy_http_version 1.1; 
  proxy_pass http://localhost:8080/; 
}
location /api/user/ { 
  proxy_http_version 1.1; 
  proxy_pass http://localhost:8080/; 
}
location /api/cart/ { 
  proxy_http_version 1.1; 
  proxy_pass http://localhost:8080/; 
}
location /api/shipping/ { 
  proxy_http_version 1.1; 
  proxy_pass http://localhost:8080/; 
}
location /api/payment/ { 
  proxy_http_version 1.1; 
  proxy_pass http://localhost:8080/; 
}

location /health {
  stub_status on;
  access_log off;
}